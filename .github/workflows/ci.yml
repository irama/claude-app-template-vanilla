name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type check, lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npx eslint src

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
        env:
          # Add any build-time env vars here (use GitHub Secrets for real values)
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Don't block CI, but surface the output
